version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: davinovate-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: davinovate
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
